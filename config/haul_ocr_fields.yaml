# HaulSafe OCR field definitions for the LCPT cover sheet (2026 layout).
#
# fieldName — the name sent to HaulSafe OCR. HaulSafe Vision AI uses these
# as semantic hints to locate values on the page, so they MUST match the
# labels printed on the cover sheet as closely as possible.
#
# fieldType — TEXT for text/checkbox values, DATE for dates.
#
# Cover sheet layout (each line is one row on the page):
#   Work Request Number: <text>
#   Checklist:
#     [ ] Attach documents to Internal Attachments  -> attachDocumentsToInternalAttachments
#     [ ] Attach documents to Attachments          -> attachDocumentsToAttachments
#     [ ] Process Through State Agency             -> processThroughStateAgency
#     [ ] Receive Credentials                      -> receiveCredentials
#     [ ] Send Credentials                         -> sendCredentials
#   Additional Notes: <text>
#   Completed By: <text>
#   Date: <text>
#
# NOTE: There is NO Company Name field on the cover sheet. Do not add one
# back without updating the cover sheet template first.

fields:
  - fieldName: workRequestNumber
    fieldType: TEXT
  - fieldName: attachDocumentsToInternalAttachments
    fieldType: TEXT
  - fieldName: attachDocumentsToAttachments
    fieldType: TEXT
  - fieldName: processThroughStateAgency
    fieldType: TEXT
  - fieldName: receiveCredentials
    fieldType: TEXT
  - fieldName: sendCredentials
    fieldType: TEXT
  - fieldName: additionalNotes
    fieldType: TEXT
  - fieldName: completedBy
    fieldType: TEXT
  - fieldName: date
    fieldType: DATE
