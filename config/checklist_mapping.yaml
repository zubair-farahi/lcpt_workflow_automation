# Checklist item mapping for LCPT Scan Automation
#
# Each entry maps a (task_type, cover_sheet_action) pair to the exact
# checklist item name as it appears in CP Suite.
#
# task_type           — the CP Suite task type string (exact match)
# action              — one of: PROCESS_THROUGH_STATE_AGENCY | RECEIVE_CREDENTIALS | COMPLETE
# checklist_item_name — exact name of the checklist item in CP Suite (case-insensitive match at runtime)
#
# TODO: Replace placeholder task_type values and checklist_item_name values with
#       the real David Lorge mapping table once confirmed.

mappings:
  # ── Placeholder entries — UPDATE with real values ──────────────────────────
